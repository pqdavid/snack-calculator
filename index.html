<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小廢物清算機｜零食精算師</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app" data-node-id="1:2">
    <section class="top" aria-labelledby="amount-label">

      <!-- 標題列：金額輸入 + 快速查詢 -->
      <div class="title">
        <div class="amount-input">
          <div class="icon-arrow" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 9H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M10 4.5L15 9L10 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <label id="amount-label" class="sr-only" for="amount">請輸入零食金剩餘金額</label>
          <input id="amount" inputmode="numeric" pattern="[0-9]*" placeholder="輸入剩餘金額" />
        </div>
        <button id="quick-query" class="btn btn-outline" type="button">快速查詢</button>
      </div>

      <!-- 內容區：已選取 + 選擇卡片 -->
      <div class="content">

        <!-- 已選取的價格 -->
        <div class="selected-board">
          <p class="selected-label">你選取了</p>
          <div class="selected-list" id="selected-list" aria-live="polite" aria-label="已選取的零食價格"></div>
        </div>

        <!-- 選擇卡片 -->
        <div class="pick-box">

          <!-- 預設品項列 -->
          <div class="pick-row pick-row--border">
            <div class="row-name">預設品項</div>
            <div class="pills-list" id="price-pills" role="group" aria-label="零食品項金額選擇"></div>
          </div>

          <!-- 手動新增列 -->
          <div class="pick-row">
            <div class="row-name">手動新增</div>
            <div class="manual-add">
              <div class="manual-input-wrap">
                <input id="custom-price" inputmode="numeric" pattern="[0-9]*" placeholder="請輸入價格" aria-label="手動新增零食價格" />
              </div>
              <button id="add-price" class="btn btn-outline btn-sm" type="button">新增</button>
            </div>
          </div>

        </div>
      </div>

      <!-- 計算按鈕 -->
      <button id="calc" class="btn btn-primary btn-full" type="button">
        <span>零食精算GO</span>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 12L15.5 15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

    </section>

    <section class="panel" style="display: none;">
      <div class="toggle" role="tablist" aria-label="計算模式">
        <button id="mode-max-variety" class="toggle-btn is-active" role="tab" aria-selected="true">買最多樣</button>
        <button id="mode-min-left" class="toggle-btn" role="tab" aria-selected="false">剩餘最少錢</button>
        <button id="mode-max-types" class="toggle-btn" role="tab" aria-selected="false">買最多種</button>
      </div>

      <div class="list" aria-live="polite">
        <div class="list-title">你可以購買：</div>
        <div id="result-list" class="units"></div>
      </div>

      <div class="remain">
        <div class="remain-title">剩餘</div>
        <div id="remain-price" class="price-box">
          <div class="price-val">0</div>
          <div class="price-unit">元</div>
        </div>
      </div>

      <!-- Loading 動畫 -->
      <div id="loading" class="loading-container" style="display: none;">
        <div class="loading-spinner">
          <div class="loading-ring"></div>
        </div>
        <div class="loading-text">計算中...</div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
